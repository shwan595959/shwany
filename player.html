<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shwany - 스와니 (최고의 영상 플렛폼)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #000; padding-top: 60px; }

    /* ── 플레이어 ── */
    .player-wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .video-container {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── 영상 정보 ── */
    .video-info {
      padding: 28px 0;
    }

    .video-info h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .video-meta {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #aaa;
      flex-wrap: wrap;
    }

    .video-meta .match  { color: #46d369; font-weight: bold; }
    .video-meta .badge  {
      border: 1px solid #aaa;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 0.8rem;
    }
    .video-meta .cat {
      background: var(--dark3);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #ccc;
    }

    .video-desc {
      color: #ccc;
      line-height: 1.8;
      font-size: 0.95rem;
      max-width: 800px;
      margin-bottom: 24px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--dark3);
      color: white;
      border: 1px solid #444;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #333;
      border-color: white;
    }

    /* ── 관련 영상 ── */
    .related-section {
      padding: 0 24px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .related-section h3 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #e5e5e5;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .related-grid .video-card { flex: none; width: 100%; }

    @media (max-width: 768px) {
      .player-wrap { padding: 0 12px; }
      .video-info h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- ── 네비게이션 ── -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-left">
      <a class="logo" href="index.html">🎬 Shwany</a>
      <ul class="nav-menu">
        <li><a href="index.html">메인</a></li>
        <li><a href="list.html">정렬 알고리즘</a></li>
        <li><a href="search.html">탐색 알고리즘</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── 플레이어 ── -->
  <div class="player-wrap">
    <div class="video-container">
      <video id="mainVideo" controls autoplay controlsList="nodownload">
        <source id="videoSrc" src="" type="video/mp4">
      </video>
    </div>

    <div class="video-info">
      <h1 id="videoTitle">Loading...</h1>
      <div class="video-meta" id="videoMeta"></div>
      <p class="video-desc" id="videoDesc"></p>
      <a class="back-btn" onclick="history.back()">← 다른 거 볼래요!</a>
    </div>
  </div>

  <!-- ── 관련 영상 ── -->
  <div class="related-section">
    <h3>관련 영상</h3>
    <div class="related-grid" id="relatedGrid"></div>
  </div>

  <!-- ── 로딩 ── -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      showLoading(true)

      try {
        const params  = new URLSearchParams(window.location.search)
        const id      = parseInt(params.get('id'))
        const videos  = await fetchCatalog()
        const video   = videos.find(v => v.id === id)

        if (!video) throw new Error('영상 없음')

        // 영상 세팅
        document.title = `MyFlix - ${video.title}`
        document.getElementById('videoSrc').src = video.videoUrl
        document.getElementById('mainVideo').load()

        document.getElementById('videoTitle').textContent = video.title
        document.getElementById('videoDesc').textContent  = video.description
        document.getElementById('videoMeta').innerHTML    = `
          <span class="match">✔ ${video.match || 97}% 일치</span>
          <span>${video.year}</span>
          <span>${video.duration}</span>
          <span class="badge">${video.rating}</span>
          <span class="cat">${video.category}</span>
        `

        // 관련 영상 (같은 카테고리, 현재 영상 제외)
        const related = videos
          .filter(v => v.category === video.category && v.id !== id)
          .slice(0, 6)

        document.getElementById('relatedGrid').innerHTML =
          related.length
            ? related.map(createCard).join('')
            : '<p style="color:#555">어이쿠! 아직 데이터가 부족해요!</p>'

      } catch(e) {
        console.error(e)
        document.getElementById('videoTitle').textContent = '잘못 입력하신건가요?'
      }

      showLoading(false)
    })
  </script>
</body>
</html>
